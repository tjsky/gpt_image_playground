server {
    listen ${HOST}:${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 600m;

    # gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 256;

    # 静态资源长缓存（Vite 生成的带 hash 文件名）
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # BEGIN API PROXY
    # API 代理。前端请求同源 /api-proxy/...，由 Nginx 转发到部署时配置的 API_PROXY_URL。
    location /api-proxy/ {
        # 1. 拦截非假 KEY 的请求
        if ($http_authorization != "Bearer ${DEFAULT_API_KEY}") {
            return 401 "Unauthorized: Invalid Proxy Key";
        }

        # 2. 注入替换：真实 KEY
        proxy_set_header Authorization "Bearer ${API_PROXY_KEY}";

        limit_except POST OPTIONS {
            deny all;
        }

        set $allow_proxy 0;
        if ($uri ~* ^/api-proxy/((v1/)?(images/generations|images/edits|responses))$) {
            set $allow_proxy 1;
        }
        if ($allow_proxy = 0) {
            return 403 "Forbidden: API Proxy path restricted";
        }

        # 3. 转发到真实的 API
        proxy_pass ${API_PROXY_URL}/;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name $proxy_host;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        proxy_request_buffering off;
    }
    # END API PROXY
    # BEGIN IMAGE PROXY
    location /image-proxy/ {
        if ($arg_url = "") {
            return 400 "Missing url parameter";
        }

        resolver 127.0.0.11 8.8.8.8 1.1.1.1 valid=300s ipv6=off;
        
        proxy_pass $arg_url;
        proxy_ssl_server_name on;
        
        proxy_set_header Host $proxy_host;
        proxy_set_header Authorization "";
        proxy_set_header Cookie "";
        
        proxy_connect_timeout 60s;
        proxy_read_timeout 600s;
    }
    # END IMAGE PROXY

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
